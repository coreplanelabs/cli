name: Release

on:
  push:
    tags:
      - 'v*'

# Scoped npm package. Keep these in sync with package.json and the various
# packaging manifests.
env:
  NPM_PACKAGE_NAME: '@coreplane/nominal'
  NPM_TARBALL_BASENAME: 'nominal'   # tarball filename after /-/ on the registry

jobs:
  # Run the full matrix (typecheck + lint + test + build on Node 18/20/22)
  # before anything else. If this fails, nothing below runs — no npm publish,
  # no Homebrew bump, no GitHub release.
  checks:
    uses: ./.github/workflows/checks.yml
    secrets: inherit

  release:
    name: Publish to npm + GitHub Release
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tarball_url: ${{ steps.meta.outputs.tarball_url }}
      tarball_sha256: ${{ steps.meta.outputs.tarball_sha256 }}
    steps:
      - uses: actions/checkout@v4

      # Node 24 ships npm 11.x, which already supports Trusted Publishers
      # (OIDC). We intentionally don't run `npm install -g npm@latest` — the
      # npm bundled with some Node 22.x patch releases has a broken
      # node_modules (missing `promise-retry`) that makes self-upgrade fail.
      # ci.yml still runs the test matrix against 18/20/22 for runtime compat.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NOMINAL_API_DOMAIN: ${{ secrets.NOMINAL_API_DOMAIN }}
          NOMINAL_OAUTH_CLIENT_ID: ${{ secrets.NOMINAL_OAUTH_CLIENT_ID }}
          NOMINAL_OAUTH_CLIENT_SECRET: ${{ secrets.NOMINAL_OAUTH_CLIENT_SECRET }}

      # Pack the tarball ourselves so we own the bytes. `npm publish` then
      # uploads that exact file — same sha256 as what the registry will serve
      # to Homebrew. This avoids racing the npm CDN after publish.
      - name: Pack npm tarball
        id: pack
        run: |
          mkdir -p release-artifacts
          VERSION="${GITHUB_REF_NAME#v}"
          # `npm pack` names scoped packages as e.g. coreplane-nominal-0.1.0.tgz;
          # rename to match the unscoped basename the registry URL uses, so the
          # local sha lines up with what Homebrew computes after download.
          npm pack --pack-destination=release-artifacts >/dev/null
          PACKED="$(ls release-artifacts/*.tgz | head -1)"
          # Prefix with ./ so npm treats the argument as a local file, not a
          # github shorthand "owner/repo" spec (the / in the path triggers it).
          TARBALL_LOCAL="./release-artifacts/${NPM_TARBALL_BASENAME}-${VERSION}.tgz"
          mv "$PACKED" "$TARBALL_LOCAL"
          echo "tarball_local=$TARBALL_LOCAL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"            >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish "${{ steps.pack.outputs.tarball_local }}" --access public --provenance

      # Stage release artifacts. Only nominal.mjs ships now — install.sh and
      # install.ps1 both fetch it directly from the GitHub Release.
      - name: Stage release artifacts
        run: cp dist/nominal.mjs release-artifacts/

      - name: Capture release metadata
        id: meta
        run: |
          VERSION="${{ steps.pack.outputs.version }}"
          # Scoped npm package — the URL after the scope uses the unscoped
          # basename for the tarball filename.
          TARBALL_URL="https://registry.npmjs.org/${NPM_PACKAGE_NAME}/-/${NPM_TARBALL_BASENAME}-${VERSION}.tgz"
          TARBALL_SHA="$(sha256sum ${{ steps.pack.outputs.tarball_local }} | awk '{print $1}')"
          echo "version=$VERSION"            >> "$GITHUB_OUTPUT"
          echo "tarball_url=$TARBALL_URL"    >> "$GITHUB_OUTPUT"
          echo "tarball_sha256=$TARBALL_SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/nominal.mjs

  update-homebrew:
    name: Bump Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check for tap token
        id: gate
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping tap update." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tap
        if: steps.gate.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          repository: coreplanelabs/homebrew-nominal
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update Formula/nominal.rb
        if: steps.gate.outputs.skip == 'false'
        run: |
          cd tap
          FORMULA=Formula/nominal.rb
          sed -i "s|url \".*\"|url \"${{ needs.release.outputs.tarball_url }}\"|" "$FORMULA"
          sed -i "s|sha256 \".*\"|sha256 \"${{ needs.release.outputs.tarball_sha256 }}\"|" "$FORMULA"
          git config user.name  'coreplane-bot'
          git config user.email 'bot@coreplane.dev'
          git commit -am "nominal ${{ needs.release.outputs.version }}" || {
            echo "Nothing to commit — formula already at this version." >&2
            exit 0
          }
          git push

